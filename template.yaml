AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Traveler service - attaches GET /traveler to POJOS-GW.
Parameters:
  PojosApiId:
    Type: String
    Description: Shared POJOS-GW HTTP API ID
  PojosAuthorizerId:
    Type: String
    Description: Shared POJOS JWT authorizer ID
Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 128
Resources:
  TravelerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambda_handler
  TravelerIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PojosApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TravelerFunction.Arn
      PayloadFormatVersion: '2.0'
  TravelerRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PojosApiId
      RouteKey: 'GET /traveler'
      AuthorizationType: NONE
      Target: !Sub 'integrations/${TravelerIntegration}'
  TravelerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TravelerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PojosApiId}/*/*/*'
Outputs:
  TravelerFunctionArn:
    Value: !GetAtt TravelerFunction.Arn
